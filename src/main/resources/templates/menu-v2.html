<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Hotel Paradise</title>
    <style>
        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial,sans-serif;
        }

        body{
        background:#f4f4f4;
        }

        .container{
        width:90%;
        margin:auto;
        padding:30px 0;
        }

        .header{
        text-align:center;
        margin-bottom:30px;
        }

        .header h1{
        color:#ff6600;
        font-size:42px;
        }

        .header p{
        color:#666;
        margin-top:8px;
        }

        .top-bar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:30px;
        gap:20px;
        }

        #search{
        flex:1;
        padding:15px;
        border:none;
        border-radius:30px;
        box-shadow:0 4px 12px rgba(0,0,0,.15);
        font-size:16px;
        }

        .cart-btn{
        background:#ff6600;
        color:white;
        padding:15px 25px;
        text-decoration:none;
        border-radius:30px;
        font-weight:bold;
        }

        .menu-container{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
        gap:25px;
        }

        .card{
        background:white;
        border-radius:18px;
        overflow:hidden;
        box-shadow:0 5px 15px rgba(0,0,0,.15);
        transition:.3s;
        }

        .card:hover{
        transform:translateY(-6px);
        }

        .food-image{
        width:100%;
        height:200px;
        object-fit:cover;
        }

        .card-content{
        padding:20px;
        }

        .title-row{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:10px;
        }

        .badge{
        background:red;
        color:white;
        padding:5px 10px;
        border-radius:20px;
        font-size:12px;
        }

        .rating{
        color:#f39c12;
        margin-bottom:10px;
        }

        .category{
        color:#666;
        margin-bottom:10px;
        }

        .price{
        font-size:26px;
        font-weight:bold;
        color:#ff6600;
        margin-bottom:15px;
        }

        input[type=number]{
        width:70px;
        padding:8px;
        margin-right:10px;
        }

        button{
        background:#ff6600;
        color:white;
        border:none;
        padding:12px 18px;
        border-radius:10px;
        cursor:pointer;
        }

        button:hover{
        background:#e65c00;
        }

        @media(max-width:768px){

        .top-bar{
            flex-direction:column;
        }

        #search{
            width:100%;
        }

        .cart-btn{
            width:100%;
            text-align:center;
        }

    }


</style>
</head>

<body>

<div class="container">

    <div class="header">

        <h1>🍽 HOTEL PARADISE</h1>

        <p>Taste • Freshness • Happiness</p>

    </div>

    <div class="top-bar">

        <input
                type="text"
                id="search"
                placeholder="🔍 Search Food..."
                onkeyup="searchFood()">

        <a href="/cart" class="cart-btn">
            🛒 View Cart
        </a>

    </div>

    <div class="menu-container">

        <div class="card"
             th:each="food : ${foods}">



            <div class="card-content">

                <div class="title-row">

                    <h2 th:text="${food.name}"></h2>

                    <span
                            class="badge"
                            th:if="${food.bestSeller}">
                        🔥 Best Seller
                    </span>

                </div>

                <div class="rating">

                    ⭐ <span th:text="${food.rating}"></span>

                </div>

                <div class="category"
                     th:text="${food.category}">
                </div>

                <div class="price">

                    ₹ <span th:text="${food.price}"></span>

                </div>

                <form th:action="@{/cart/add}" method="post">

                    <input
                            type="hidden"
                            name="foodId"
                            th:value="${food.id}">

                    <input
                            type="number"
                            name="quantity"
                            value="0"
                            min="0">

                    <button type="submit">

                        🛒 Add To Cart

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<script>

    function searchFood(){

        let input=document.getElementById("search").value.toLowerCase();

        let cards=document.getElementsByClassName("card");

        for(let i=0;i<cards.length;i++){

            let name=cards[i].querySelector("h2").innerText.toLowerCase();

            if(name.includes(input))
                cards[i].style.display="block";
            else
                cards[i].style.display="none";

        }

    }

</script>

</body>

</html>
