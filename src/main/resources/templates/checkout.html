<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Checkout</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f5f5f5;
            padding:30px;
        }

        .container{
            max-width:850px;
            margin:auto;
            background:white;
            padding:35px;
            border-radius:18px;
            box-shadow:0 8px 20px rgba(0,0,0,.15);
        }

        h1{
            text-align:center;
            color:#ff6600;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#666;
            margin-bottom:30px;
        }

        h2{
            color:#333;
            margin:25px 0 15px;
        }

        p{
            font-size:18px;
            margin:10px 0;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th{
            background:#ff6600;
            color:white;
            padding:15px;
        }

        td{
            padding:15px;
            text-align:center;
            border-bottom:1px solid #eee;
        }

        .total{
            text-align:right;
            font-size:30px;
            font-weight:bold;
            color:#ff6600;
            margin-top:25px;
        }

        button{
            width:100%;
            margin-top:35px;
            padding:16px;
            border:none;
            border-radius:10px;
            background:#4CAF50;
            color:white;
            font-size:20px;
            cursor:pointer;
        }

        button:hover{
            background:#388E3C;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🍽 Confirm Your Order</h1>

    <p class="subtitle">
        Please review your order before sending it to the kitchen.
    </p>

    <h2>Customer Details</h2>

    <p><b>Name :</b> <span th:text="${customerName}"></span></p>

    <p><b>Phone :</b> <span th:text="${phoneNumber}"></span></p>

    <p><b>Table :</b> <span th:text="${tableId}"></span></p>

    <h2>Order Summary</h2>

    <table>

        <tr>
            <th>Food</th>
            <th>Qty</th>
            <th>Total</th>
        </tr>

        <tr th:each="item : ${cart}">
            <td th:text="${item.foodName}"></td>
            <td th:text="${item.quantity}"></td>
            <td>₹ <span th:text="${item.totalPrice}"></span></td>
        </tr>

    </table>

    <div class="total">
        Grand Total : ₹ <span th:text="${total}"></span>
    </div>

    <form action="/checkout/place" method="post">

        <button type="submit">

            ✅ Place Order

        </button>

    </form>

</div>

</body>
</html>
