<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Shopping Cart</title>
    <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
    }

    body{
    background:#f5f5f5;
    padding:30px;
    }

    h1{
    text-align:center;
    color:#ff6600;
    margin-bottom:30px;
    }

    table{
    width:100%;
    background:white;
    border-radius:15px;
    overflow:hidden;
    border-collapse:collapse;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
    }

    th{
    background:#ff6600;
    color:white;
    padding:18px;
    font-size:17px;
    }

    td{
    padding:18px;
    text-align:center;
    border-bottom:1px solid #eee;
    }

    tr:hover{
    background:#fafafa;
    }

    button{
    border:none;
    cursor:pointer;
    border-radius:8px;
    padding:8px 15px;
    }

    .remove{
    background:#e53935;
    color:white;
    }

    .remove:hover{
    background:#c62828;
    }

    .total{

    margin-top:30px;
    text-align:right;
    font-size:28px;
    font-weight:bold;
    color:#ff6600;
    }

    .buttons{

    margin-top:35px;
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    }

    .btn{
    text-decoration:none;
    }

    .continue{

    background:#2196F3;
    color:white;
    padding:15px 30px;
    }

    .checkout{

    background:#4CAF50;
    color:white;
    padding:15px 30px;
    }

    .continue:hover{

    background:#1976D2;
    }

    .checkout:hover{

    background:#388E3C;
    }
    </style>

</head>

<body>

<h1>🛒 Your Order</h1>
<p style="text-align:center;color:gray;margin-bottom:25px;">
    Review your food before confirming the order
</p>

<table>

    <tr>

        <th>Food</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Total</th>
        <th>Action</th>

    </tr>

    <tr th:each="item : ${cart}">

        <td th:text="${item.foodName}"></td>

        <td>
            ₹ <span th:text="${item.price}"></span>
        </td>

        <td>

            <form th:action="@{/cart/decrease}" method="post" style="display:inline;">

                <input type="hidden"
                       name="foodId"
                       th:value="${item.foodId}">

                <button type="submit">➖</button>

            </form>

            <b th:text="${item.quantity}"></b>

            <form th:action="@{/cart/increase}" method="post" style="display:inline;">

                <input type="hidden"
                       name="foodId"
                       th:value="${item.foodId}">

                <button type="submit">➕</button>

            </form>

        </td>

        <td>
            ₹ <span th:text="${item.totalPrice}"></span>
        </td>

        <td>

            <form th:action="@{/cart/remove}" method="post">

                <input
                        type="hidden"
                        name="foodId"
                        th:value="${item.foodId}">

                <button
                        type="submit"
                        class="remove">

                    🗑 Remove

                </button>

            </form>

        </td>

    </tr>

</table>

<div class="total">

    Grand Total :
    ₹ <span th:text="${total}"></span>

</div>

<div class="buttons">

    <a href="/menu-again">

        <button class="continue">

            🍽 Add More Items

        </button>

    </a>

    <a href="/checkout" class="btn">

        <button class="checkout">

            ✅ Confirm Order
        </button>

    </a>

</div>

</body>

</html>
