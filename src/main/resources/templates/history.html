<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Order History</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:30px;
        }

        .container{

            width:700px;

            margin:auto;

            background:white;

            padding:30px;

            border-radius:15px;

            box-shadow:0 5px 15px rgba(0,0,0,.2);

        }

        input{

            width:100%;

            padding:12px;

            margin-top:15px;

        }

        button{

            margin-top:15px;

            padding:12px 30px;

            background:#ff6600;

            color:white;

            border:none;

            cursor:pointer;

            border-radius:8px;

        }

        .card{

            margin-top:20px;

            background:#fafafa;

            padding:15px;

            border-radius:10px;

            border-left:5px solid orange;

        }

    </style>

</head>

<body>

<div class="container">

    <h1>📜 Customer Order History</h1>

    <form action="/history" method="post">

        <input
                type="text"
                name="phoneNumber"
                placeholder="Enter Phone Number"
                required>

        <button type="submit">

            Search

        </button>

    </form>

    <div
            class="card"
            th:each="order : ${orders}">

        <h3>

            Order #
            <span th:text="${order.id}"></span>

        </h3>

        <p>

            Customer :
            <span th:text="${order.customerName}"></span>

        </p>

        <p>

            Table :
            <span th:text="${order.tableId}"></span>

        </p>

        <p>

            Total :
            ₹ <span th:text="${order.totalAmount}"></span>

        </p>

        <p>

            Status :
            <span th:text="${order.status}"></span>

        </p>

    </div>

</div>

</body>

</html>
