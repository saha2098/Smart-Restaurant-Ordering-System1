<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Hotel Paradise Menu</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f4f4;
            padding:30px;
        }

        h1{
            text-align:center;
            color:#ff6600;
            margin-bottom:10px;
        }

        h3{
            text-align:center;
            margin-bottom:30px;
        }

        .menu-container{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
        }

        .card{

            width:250px;

            background:white;

            border-radius:15px;

            padding:20px;

            text-align:center;

            box-shadow:0 5px 15px rgba(0,0,0,.2);

            transition:.3s;
        }

        .card:hover{

            transform:translateY(-5px);

        }

        .card h2{
            color:#ff6600;
            margin-bottom:10px;
        }

        .price{

            font-size:22px;

            font-weight:bold;

            color:#333;

            margin:10px 0;
        }

        .category{

            color:gray;

            margin-bottom:15px;
        }

        input[type=number]{

            width:80px;

            padding:8px;

            text-align:center;

            border-radius:5px;

            border:1px solid gray;
        }

        .btn-container{

            text-align:center;

            margin-top:40px;
        }

        button{

            background:#ff6600;

            color:white;

            border:none;

            padding:15px 45px;

            border-radius:10px;

            font-size:18px;

            cursor:pointer;
        }

        button:hover{

            background:#e65c00;
        }

    </style>

</head>

<body>

<h1>🍽 HOTEL PARADISE</h1>

<h3>

    Table :
    <span th:text="${tableId}"></span>

</h3>

<form th:action="@{/orders/place}" method="post">

    <input
            type="hidden"
            name="tableId"
            th:value="${tableId}">

    <input
            type="hidden"
            name="customerName"
            th:value="${customerName}">

    <input
            type="hidden"
            name="phoneNumber"
            th:value="${phoneNumber}">

    <div th:replace="navbar :: navbar"></div>

        <div class="card"
             th:each="food : ${foods}">

            <h2 th:text="${food.name}"></h2>

            <div class="price">

                ₹ <span th:text="${food.price}"></span>

            </div>

            <div class="category"
                 th:text="${food.category}">
            </div>

            <input
                    type="hidden"
                    name="foodId"
                    th:value="${food.id}">

            <label>

                Quantity

            </label>

            <br><br>

            <input
                    type="number"
                    name="quantity"
                    value="0"
                    min="0">

        </div>

    </div>

    <div class="btn-container">

        <button type="submit">

            Place Order

        </button>

    </div>

</form>

</body>

</html>
